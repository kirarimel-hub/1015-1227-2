<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWYA（ロウヤ）</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; -webkit-tap-highlight-color: transparent; }
        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #header { background: #007bff; color: white; padding: 10px 12px; display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }
        
        /* メディア関連 */
        #media-section { background: #111; padding: 10px; flex-shrink: 0; }
        #media-input-wrapper { display: flex; gap: 5px; margin-bottom: 10px; }
        #media-url-input { flex: 1; padding: 8px; border-radius: 4px; border: none; font-size: 0.9rem; background: #222; color: #fff; outline: none; }
        #media-share-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #media-container { display: flex; flex-direction: column; transition: all 0.3s; }
        #media-menu { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px 10px; }
        .media-tabs { display: flex; gap: 5px; }
        .media-tab-btn { background: #444; color: #ccc; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .media-tab-btn.active { background: #007bff; color: white; }
        #media-screen { width: 100%; height: 240px; background: #000; position: relative; }
        #youtube-player { width: 100%; height: 100%; border: none; }
        #spotify-player { width: 100%; height: 100%; border: none; display: none; }
        .minimized #media-screen { height: 0; }

        /* チャットエリア */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; background: #fff; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; margin-bottom: 5px; }
        .my-messages { align-self: flex-end; align-items: flex-end; }
        .other-messages { align-self: flex-start; align-items: flex-start; }
        
        .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; }
        .my-messages .message-row { flex-direction: row-reverse; }

        /* メッセージ本体 */
        .message { padding: 10px 14px; border-radius: 18px; background: #e4e6eb; font-size: 0.9rem; word-break: break-all; white-space: pre-wrap; cursor: pointer; transition: transform 0.1s; position: relative; user-select: none; }
        .message:active { transform: scale(0.98); }
        .my-messages .message { background: #007bff; color: white; }
        
        /* リアクション表示バッジ */
        .reaction-badge-container { display: flex; gap: 3px; position: absolute; bottom: -12px; background: white; padding: 2px 6px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border: 1px solid #eee; font-size: 0.75rem; cursor: pointer; z-index: 2; pointer-events: auto; color: #333; }
        .my-messages .reaction-badge-container { right: 10px; }
        .other-messages .reaction-badge-container { left: 10px; }

        /* インスタ風ポップアップメニュー */
        .reaction-popup { display: none; position: absolute; background: white; border-radius: 30px; padding: 5px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); gap: 8px; z-index: 999; animation: popUp 0.15s ease-out; border: 1px solid #ddd; }
        @keyframes popUp { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .reaction-emoji-btn { font-size: 1.3rem; border: none; background: none; cursor: pointer; padding: 0 2px; transition: transform 0.1s; }
        .reaction-emoji-btn:hover { transform: scale(1.25); }

        /* 個別削除リンク */
        .msg-delete-link { font-size: 0.7rem; color: #aaa; text-decoration: none; cursor: pointer; visibility: hidden; margin: 0 4px; padding-bottom: 2px; }
        .message-wrapper:hover .msg-delete-link { visibility: visible; }
        
        #input-container { display: flex; padding: 10px; border-top: 1px solid #ddd; gap: 8px; background: white; flex-shrink: 0; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <button id="clear-all-btn" style="background:#dc3545; color:white; border:none; border-radius:4px; padding: 5px 10px; cursor:pointer; font-size:0.85rem;">全削除</button>
    </div>

    <div id="media-section">
        <div id="media-input-wrapper">
            <input type="text" id="media-url-input" placeholder="YouTubeの動画URLを貼り付け">
            <button id="media-share-btn">動画を流す</button>
        </div>
        <div id="media-container">
            <div id="media-menu">
                <div class="media-tabs">
                    <button class="media-tab-btn active" id="tab-youtube">YouTube (同期中)</button>
                    <button class="media-tab-btn" id="tab-spotify">Spotify</button>
                </div>
                <button id="media-toggle-btn" style="background:none; border:none; color:white; cursor:pointer; font-size:1rem;">➖</button>
            </div>
            <div id="media-screen">
                <div id="youtube-player"></div>
                <iframe id="spotify-player" allow="encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <div id="messages"></div>

    <div id="global-reaction-popup" class="reaction-popup">
        <button class="reaction-emoji-btn" data-emoji="👍">👍</button>
        <button class="reaction-emoji-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-emoji-btn" data-emoji="😂">😂</button>
        <button class="reaction-emoji-btn" data-emoji="😮">😮</button>
        <button class="reaction-emoji-btn" data-emoji="😢">😢</button>
        <button class="reaction-emoji-btn" data-emoji="🙏">🙏</button>
    </div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="メッセージを入力...">
        <button id="send-btn">送信</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkCdoQOuL9Kh0T0P9CCJPL39WMkT5t-nw",
        authDomain: "project-2987921418155591586.firebaseapp.com",
        projectId: "project-2987921418155591586",
        storageBucket: "project-2987921418155591586.firebasestorage.app",
        messagingSenderId: "34152717352",
        appId: "1:34152717352:web:244bc26dbcf8dec5b7691d"
    };

    // 🌟 Firebaseの初期化を完全ガード。エラーが起きてもYouTube処理を殺さない
    let db = null;
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
    } catch (e) {
        console.error("Firebaseの初期化に失敗しました。オフライン動作に切り替えます:", e);
    }

    const myId = Math.random().toString(36).substring(2, 9);
    let player = null; 
    let isUpdatingFromFirebase = false; 
    let currentVideoId = "JFf3uASYM4E"; 
    let activeMessageId = null;

    const container = document.getElementById('messages');
    const popup = document.getElementById('global-reaction-popup');

    function scrollToBottom() {
        setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    }

    // 🌟 YouTubeプレイヤーの生成（一番最初に、何があっても絶対に単体で起動するように配置）
    window.onYouTubeIframeAPIReady = function() {
        try {
            player = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId, 
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'playsinline': 1 }, // 自動再生をONに
                events: { 'onStateChange': onPlayerStateChange }
            });
        } catch (e) {
            console.error("YouTubeプレイヤーの作成に失敗しました:", e);
        }
    };

    async function onPlayerStateChange(event) {
        if (!player || isUpdatingFromFirebase || !currentVideoId || !db) return;
        const statusRef = doc(db, "shared_media_v4", "current");
        let stateString = "paused";
        if (event.data == YT.PlayerState.PLAYING) stateString = "playing";
        
        try {
            await setDoc(statusRef, {
                type: 'youtube',
                videoId: currentVideoId,
                state: stateString,
                currentTime: player.getCurrentTime(),
                updatedBy: myId,
                timestamp: Date.now()
            });
        } catch (e) { console.error("状態送信エラー(無視してOK):", e); }
    }

    // 定期同期ループ
    setInterval(async () => {
        if (db && player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING && !isUpdatingFromFirebase && currentVideoId) {
            try {
                const statusRef = doc(db, "shared_media_v4", "current");
                await setDoc(statusRef, {
                    type: 'youtube',
                    videoId: currentVideoId,
                    state: "playing",
                    currentTime: player.getCurrentTime(),
                    updatedBy: myId,
                    timestamp: Date.now()
                }, { merge: true });
            } catch (e) { }
        }
    }, 4000);

    function getYouTubeId(url) {
        const regExp = /^.*(?:(?:youtu\.be\/|v\/|vi\/|u\/\w\/|embed\/|shorts\/|live\/)|(?:(?:watch)?\?v(?:i)?=|\&v(?:i)?=))([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[1].length === 11) ? match[1] : null;
    }

    // 動画共有ボタン
    document.getElementById('media-share-btn').onclick = async () => {
        const url = document.getElementById('media-url-input').value.trim();
        if (!url) return;

        if (url.includes('spotify.com')) {
            const embedUrl = url.replace('open.spotify.com/', 'open.spotify.com/embed/');
            if (db) {
                try { await setDoc(doc(db, "shared_media_v4", "current"), { type: 'spotify', url: embedUrl, updatedBy: myId, timestamp: Date.now() }); } catch(e){}
            }
        } else {
            const videoId = getYouTubeId(url);
            if (videoId) {
                currentVideoId = videoId;
                if (db) {
                    try {
                        await setDoc(doc(db, "shared_media_v4", "current"), {
                            type: 'youtube',
                            videoId: videoId,
                            state: "playing",
                            currentTime: 0,
                            updatedBy: myId,
                            timestamp: Date.now()
                        });
                    } catch(e){}
                }
                isUpdatingFromFirebase = true;
                if (player && player.loadVideoById) {
                    player.loadVideoById({ videoId: videoId, startSeconds: 0 });
                }
                setTimeout(() => { isUpdatingFromFirebase = false; }, 1200);
            } else {
                alert("正しいYouTubeのURLを入力してください");
            }
        }
        document.getElementById('media-url-input').value = '';
    };

    // 映像リアルタイム同期
    if (db) {
        try {
            onSnapshot(doc(db, "shared_media_v4", "current"), (snapshot) => {
                if (!snapshot.exists()) return;
                const data = snapshot.data();
                if (data.updatedBy === myId) return;

                isUpdatingFromFirebase = true;

                if (data.type === 'spotify') {
                    switchMediaTab('spotify');
                    document.getElementById('spotify-player').src = data.url;
                    isUpdatingFromFirebase = false;
                    return;
                }

                switchMediaTab('youtube');
                if (data.videoId && data.videoId !== currentVideoId) {
                    currentVideoId = data.videoId;
                    if (player && player.loadVideoById) {
                        player.loadVideoById({ videoId: currentVideoId, startSeconds: data.currentTime || 0 });
                    }
                }
                if (player && player.getPlayerState) {
                    if (data.state === "paused" && player.getPlayerState() !== YT.PlayerState.PAUSED) player.pauseVideo();
                    if (data.state === "playing" && player.getPlayerState() !== YT.PlayerState.PLAYING) player.playVideo();
                    
                    const localTime = player.getCurrentTime();
                    if (data.currentTime && Math.abs(localTime - data.currentTime) > 3.5) {
                        player.seekTo(data.currentTime, true);
                    }
                }
                setTimeout(() => { isUpdatingFromFirebase = false; }, 1500);
            });
        } catch(e) { console.error("動画同期リスナーエラー:", e); }
    }

    // チャット送信処理
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('message-input');
        if (!input.value.trim() || !db) return;
        try {
            await addDoc(collection(db, "chat_messages"), { 
                text: input.value, 
                senderId: myId, 
                createdAt: serverTimestamp(),
                reactions: {}
            });
            input.value = '';
        } catch (e) { console.error(e); }
    };

    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    // リアクションポップアップメニューの制御
    window.openReactionMenu = function(e, msgId) {
        e.stopPropagation();
        activeMessageId = msgId;
        
        const rect = e.currentTarget.getBoundingClientRect();
        const containerRect = document.getElementById('chat-container').getBoundingClientRect();
        
        let topPosition = rect.top - containerRect.top - 45;
        let leftPosition = rect.left - containerRect.left + (rect.width / 2) - 100;
        
        if (leftPosition < 10) leftPosition = 10;
        if (leftPosition > containerRect.width - 210) leftPosition = containerRect.width - 210;

        popup.style.top = `${topPosition}px`;
        popup.style.left = `${leftPosition}px`;
        popup.style.display = 'flex';
    };

    document.addEventListener('click', () => {
        popup.style.display = 'none';
    });

    // リアクションボタン処理
    document.querySelectorAll('.reaction-emoji-btn').forEach(btn => {
        btn.onclick = async (e) => {
            e.stopPropagation();
            if (!activeMessageId || !db) return;
            
            const selectedEmoji = btn.textContent;
            const msgRef = doc(db, "chat_messages", activeMessageId);
            
            popup.style.display = 'none';

            try {
                const snap = await getDocs(query(collection(db, "chat_messages")));
                let currentReactions = {};
                snap.forEach(d => {
                    if(d.id === activeMessageId) currentReactions = d.data().reactions || {};
                });

                if (currentReactions[selectedEmoji] && currentReactions[selectedEmoji].includes(myId)) {
                    currentReactions[selectedEmoji] = currentReactions[selectedEmoji].filter(id => id !== myId);
                    if (currentReactions[selectedEmoji].length === 0) delete currentReactions[selectedEmoji];
                } else {
                    if (!currentReactions[selectedEmoji]) currentReactions[selectedEmoji] = [];
                    currentReactions[selectedEmoji].push(myId);
                }

                await updateDoc(msgRef, { reactions: currentReactions });
            } catch (err) { console.error(err); }
        };
    });

    // チャット受信
    if (db) {
        try {
            onSnapshot(query(collection(db, "chat_messages"), orderBy("createdAt", "asc")), (snap) => {
                container.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const msgId = d.id;
                    const reactions = data.reactions || {};

                    const wrapper = document.createElement('div');
                    wrapper.className = `message-wrapper ${data.senderId === myId ? 'my-messages' : 'other-messages'}`;
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'message-row';

                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message';
                    msgDiv.textContent = data.text;
                    msgDiv.setAttribute('onclick', `openReactionMenu(event, '${msgId}')`);

                    let totalReactionCount = 0;
                    const badgeDiv = document.createElement('div');
                    badgeDiv.className = 'reaction-badge-container';
                    badgeDiv.style.display = 'none';
                    badgeDiv.setAttribute('onclick', `openReactionMenu(event, '${msgId}')`);

                    let badgeText = "";
                    for (const [emoji, users] of Object.entries(reactions)) {
                        if (users.length > 0) {
                            badgeText += `${emoji}${users.length} `;
                            totalReactionCount += users.length;
                        }
                    }
                    if (totalReactionCount > 0) {
                        badgeDiv.textContent = badgeText.trim();
                        badgeDiv.style.display = 'flex';
                        msgDiv.appendChild(badgeDiv);
                    }

                    rowDiv.appendChild(msgDiv);

                    const delLink = document.createElement('span');
                    delLink.className = 'msg-delete-link';
                    delLink.textContent = '削除';
                    delLink.onclick = async (e) => {
                        e.stopPropagation();
                        if (confirm("このメッセージを削除しますか？")) {
                            await deleteDoc(doc(db, "chat_messages", msgId));
                        }
                    };
                    rowDiv.appendChild(delLink);

                    wrapper.appendChild(rowDiv);
                    container.appendChild(wrapper);
                });
                scrollToBottom();
            });
        } catch(e){}
    }

    // 全削除処理
    document.getElementById('clear-all-btn').onclick = async () => {
        if (!db || !confirm("本当にすべてのチャット履歴を削除しますか？")) return;
        try {
            const snap = await getDocs(query(collection(db, "chat_messages")));
            const deletePromises = [];
            snap.forEach(d => {
                deletePromises.push(deleteDoc(doc(db, "chat_messages", d.id)));
            });
            await Promise.all(deletePromises);
            alert("すべてのチャットを削除しました！");
        } catch (e) { alert("削除に失敗しました: " + e.message); }
    };

    function switchMediaTab(type) {
        const ytEl = document.getElementById('youtube-player');
        const spEl = document.getElementById('spotify-player');
        document.getElementById('tab-youtube').classList.toggle('active', type === 'youtube');
        document.getElementById('tab-spotify').classList.toggle('active', type === 'spotify');
        if (type === 'youtube') {
            ytEl.style.display = 'block';
            spEl.style.display = 'none';
        } else {
            ytEl.style.display = 'none';
            spEl.style.display = 'block';
            if (player && player.pauseVideo) player.pauseVideo();
        }
    }

    document.getElementById('tab-youtube').onclick = () => switchMediaTab('youtube');
    document.getElementById('tab-spotify').onclick = () => switchMediaTab('spotify');
    document.getElementById('media-toggle-btn').onclick = () => {
        const c = document.getElementById('media-container');
        c.classList.toggle('minimized');
        document.getElementById('media-toggle-btn').textContent = c.classList.contains('minimized') ? "🔲" : "➖";
        scrollToBottom();
    };
</script>
</body>
</html>
