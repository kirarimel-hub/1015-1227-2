<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWYA（ロウヤ）</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #007bff; color: white; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* メディア関連 */
        #media-section { background: #111; padding: 10px; }
        #media-input-wrapper { display: flex; gap: 5px; margin-bottom: 10px; }
        #media-url-input { flex: 1; padding: 8px; border-radius: 4px; border: none; font-size: 0.9rem; }
        #media-share-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        
        #media-container { display: flex; flex-direction: column; transition: all 0.3s; }
        #media-menu { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px 10px; }
        .media-tabs { display: flex; gap: 5px; }
        .media-tab-btn { background: #444; color: #ccc; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .media-tab-btn.active { background: #007bff; color: white; }
        #media-screen { width: 100%; height: 200px; background: #000; }
        #media-screen iframe { width: 100%; height: 100%; border: none; }
        .minimized #media-screen { height: 0; }

        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .my-messages { align-self: flex-end; align-items: flex-end; }
        .other-messages { align-self: flex-start; align-items: flex-start; }
        .message { padding: 10px; border-radius: 15px; background: #e4e6eb; font-size: 0.9rem; }
        .my-messages .message { background: #007bff; color: white; }
        
        #input-container { display: flex; padding: 10px; border-top: 1px solid #ddd; gap: 8px; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <span>LOWYAチャット</span>
        <button id="clear-all-btn" style="background:red; color:white; border:none; border-radius:4px;">全削除</button>
    </div>

    <!-- メディア共有セクション -->
    <div id="media-section">
        <div id="media-input-wrapper">
            <input type="text" id="media-url-input" placeholder="YouTube/SpotifyのURLを貼る">
            <button id="media-share-btn" onclick="shareMedia()">共有</button>
        </div>
        <div id="media-container">
            <div id="media-menu">
                <div class="media-tabs">
                    <button class="media-tab-btn active" id="tab-youtube" onclick="switchMediaTab('youtube')">YouTube</button>
                    <button class="media-tab-btn" id="tab-spotify" onclick="switchMediaTab('spotify')">Spotify</button>
                </div>
                <button id="media-toggle-btn" style="background:none; border:none; color:white; cursor:pointer;" onclick="toggleMedia()">➖</button>
            </div>
            <div id="media-screen"></div>
        </div>
    </div>

    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="message-input" placeholder="メッセージを入力...">
        <button id="send-btn">送信</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkCdoQOuL9Kh0T0P9CCJPL39WMkT5t-nw",
        authDomain: "project-2987921418155591586.firebaseapp.com",
        projectId: "project-2987921418155591586",
        storageBucket: "project-2987921418155591586.firebasestorage.app",
        messagingSenderId: "34152717352",
        appId: "1:34152717352:web:244bc26dbcf8dec5b7691d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 共有メディアの保存（Firebaseの別コレクションへ）
    window.shareMedia = async () => {
        const url = document.getElementById('media-url-input').value;
        const type = url.includes('spotify') ? 'spotify' : 'youtube';
        await addDoc(collection(db, "shared_media"), { url, type, createdAt: serverTimestamp() });
        document.getElementById('media-url-input').value = '';
    };

    // プレイヤーのレンダリング
    onSnapshot(query(collection(db, "shared_media"), orderBy("createdAt", "desc")), (snap) => {
        if (snap.empty) return;
        const latest = snap.docs[0].data();
        const screen = document.getElementById('media-screen');
        if (latest.type === 'youtube') {
            const id = latest.url.match(/(?:v=|youtu\.be\/)([^&?]+)/)[1];
            screen.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`;
        } else {
            screen.innerHTML = `<iframe src="${latest.url.replace('open.', 'open.embed.')}"></iframe>`;
        }
    });

    // 最小化
    window.toggleMedia = () => {
        const c = document.getElementById('media-container');
        c.classList.toggle('minimized');
    };

    // チャット処理
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('message-input');
        if (!input.value) return;
        await addDoc(collection(db, "chat_messages"), { text: input.value, createdAt: serverTimestamp() });
        input.value = '';
    };

    onSnapshot(query(collection(db, "chat_messages"), orderBy("createdAt", "asc")), (snap) => {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        snap.forEach(d => {
            const div = document.createElement('div');
            div.className = 'message-wrapper';
            div.innerHTML = `<div class="message">${d.data().text}</div>`;
            container.appendChild(div);
        });
    });
</script>
</body>
</html>
