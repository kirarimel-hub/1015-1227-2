<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWYA（ロウヤ）</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #007bff; color: white; padding: 10px 12px; display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }
        
        /* メディア関連 */
        #media-section { background: #111; padding: 10px; flex-shrink: 0; }
        #media-input-wrapper { display: flex; gap: 5px; margin-bottom: 10px; }
        #media-url-input { flex: 1; padding: 8px; border-radius: 4px; border: none; font-size: 0.9rem; background: #222; color: #fff; outline: none; }
        #media-share-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #media-container { display: flex; flex-direction: column; transition: all 0.3s; }
        #media-menu { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px 10px; }
        .media-tabs { display: flex; gap: 5px; }
        .media-tab-btn { background: #444; color: #ccc; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .media-tab-btn.active { background: #007bff; color: white; }
        #media-screen { width: 100%; height: 240px; background: #000; position: relative; }
        #youtube-player { width: 100%; height: 100%; border: none; }
        #spotify-player { width: 100%; height: 100%; border: none; display: none; }
        .minimized #media-screen { height: 0; }

        /* チャットエリア */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .my-messages { align-self: flex-end; align-items: flex-end; }
        .other-messages { align-self: flex-start; align-items: flex-start; }
        
        /* メッセージと個別削除ボタン */
        .message-box { display: flex; align-items: center; gap: 5px; max-width: 100%; }
        .my-messages .message-box { flex-direction: row-reverse; }
        
        .message { padding: 10px; border-radius: 15px; background: #e4e6eb; font-size: 0.9rem; word-break: break-all; white-space: pre-wrap; }
        .message img { max-width: 120px; max-height: 120px; object-fit: contain; border-radius: 8px; margin-top: 5px; display: block; }
        .my-messages .message { background: #007bff; color: white; }
        
        .delete-btn { background: none; border: none; color: #ff4d4d; font-size: 0.75rem; cursor: pointer; padding: 0 5px; opacity: 0; transition: opacity 0.2s; }
        .message-wrapper:hover .delete-btn { opacity: 1; }

        /* スタンプエリア */
        #stamp-container { display: flex; gap: 8px; padding: 5px 10px; background: #f0f2f5; border-top: 1px solid #ddd; overflow-x: auto; flex-shrink: 0; }
        .stamp-btn { width: 40px; height: 40px; cursor: pointer; border: none; background: none; padding: 0; transition: transform 0.1s; }
        .stamp-btn:hover { transform: scale(1.1); }
        .stamp-btn img { width: 100%; height: 100%; object-fit: contain; }
        
        #input-container { display: flex; padding: 10px; border-top: 1px solid #ddd; gap: 8px; background: white; flex-shrink: 0; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <button id="clear-all-btn" style="background:#dc3545; color:white; border:none; border-radius:4px; padding: 5px 10px; cursor:pointer; font-size:0.85rem;">全削除</button>
    </div>

    <div id="media-section">
        <div id="media-input-wrapper">
            <input type="text" id="media-url-input" placeholder="YouTubeの動画URLを貼り付け">
            <button id="media-share-btn">動画を流す</button>
        </div>
        <div id="media-container">
            <div id="media-menu">
                <div class="media-tabs">
                    <button class="media-tab-btn active" id="tab-youtube">YouTube (同期中)</button>
                    <button class="media-tab-btn" id="tab-spotify">Spotify</button>
                </div>
                <button id="media-toggle-btn" style="background:none; border:none; color:white; cursor:pointer; font-size:1rem;">➖</button>
            </div>
            <div id="media-screen">
                <div id="youtube-player"></div>
                <iframe id="spotify-player" allow="encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <div id="messages"></div>

    <div id="stamp-container">
        <button class="stamp-btn" data-url="https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=100&auto=format&fit=crop&q=60"><img src="https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=100&auto=format&fit=crop&q=60" alt="猫"></button>
        <button class="stamp-btn" data-url="https://images.unsplash.com/photo-1537151625747-768eb642d6fd?w=100&auto=format&fit=crop&q=60"><img src="https://images.unsplash.com/photo-1537151625747-768eb642d6fd?w=100&auto=format&fit=crop&q=60" alt="犬"></button>
        <button class="stamp-btn" data-url="https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=100&auto=format&fit=crop&q=60"><img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=100&auto=format&fit=crop&q=60" alt="いいね"></button>
        <button class="stamp-btn" data-url="https://images.unsplash.com/photo-1494253109108-2e30c049369b?w=100&auto=format&fit=crop&q=60"><img src="https://images.unsplash.com/photo-1494253109108-2e30c049369b?w=100&auto=format&fit=crop&q=60" alt="スマイル"></button>
    </div>

    <div id="input-container">
        <input type="text" id="message-input" placeholder="メッセージを入力...">
        <button id="send-btn">送信</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkCdoQOuL9Kh0T0P9CCJPL39WMkT5t-nw",
        authDomain: "project-2987921418155591586.firebaseapp.com",
        projectId: "project-2987921418155591586",
        storageBucket: "project-2987921418155591586.firebasestorage.app",
        messagingSenderId: "34152717352",
        appId: "1:34152717352:web:244bc26dbcf8dec5b7691d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const myId = Math.random().toString(36).substring(2, 9);

    let player = null; 
    let isUpdatingFromFirebase = false; 
    let currentVideoId = "JFf3uASYM4E"; 

    const container = document.getElementById('messages');

    function scrollToBottom() {
        setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    }

    // YouTubeプレイヤーの生成
    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('youtube-player', {
            height: '100%',
            width: '100%',
            videoId: currentVideoId, 
            playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0, 'playsinline': 1 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    };

    async function onPlayerStateChange(event) {
        if (!player || isUpdatingFromFirebase || !currentVideoId) return;
        const statusRef = doc(db, "shared_media_v4", "current");
        let stateString = "paused";
        if (event.data == YT.PlayerState.PLAYING) stateString = "playing";
        
        try {
            await setDoc(statusRef, {
                type: 'youtube',
                videoId: currentVideoId,
                state: stateString,
                currentTime: player.getCurrentTime(),
                updatedBy: myId,
                timestamp: Date.now()
            });
        } catch (e) { console.error(e); }
    }

    // 4秒おきの定期同期
    setInterval(async () => {
        if (player && player.getPlayerState && player.getPlayerState() === YT.PlayerState.PLAYING && !isUpdatingFromFirebase && currentVideoId) {
            const statusRef = doc(db, "shared_media_v4", "current");
            await setDoc(statusRef, {
                type: 'youtube',
                videoId: currentVideoId,
                state: "playing",
                currentTime: player.getCurrentTime(),
                updatedBy: myId,
                timestamp: Date.now()
            }, { merge: true });
        }
    }, 4000);

    function getYouTubeId(url) {
        const regExp = /^.*(?:(?:youtu\.be\/|v\/|vi\/|u\/\w\/|embed\/|shorts\/|live\/)|(?:(?:watch)?\?v(?:i)?=|\&v(?:i)?=))([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[1].length === 11) ? match[1] : null;
    }

    // 動画共有ボタン
    document.getElementById('media-share-btn').onclick = async () => {
        const url = document.getElementById('media-url-input').value.trim();
        if (!url) return;

        if (url.includes('spotify.com')) {
            const embedUrl = url.replace('open.spotify.com/', 'open.spotify.com/embed/');
            await setDoc(doc(db, "shared_media_v4", "current"), { type: 'spotify', url: embedUrl, updatedBy: myId, timestamp: Date.now() });
        } else {
            const videoId = getYouTubeId(url);
            if (videoId) {
                currentVideoId = videoId;
                await setDoc(doc(db, "shared_media_v4", "current"), {
                    type: 'youtube',
                    videoId: videoId,
                    state: "playing",
                    currentTime: 0,
                    updatedBy: myId,
                    timestamp: Date.now()
                });
                isUpdatingFromFirebase = true;
                if (player && player.loadVideoById) {
                    player.loadVideoById({ videoId: videoId, startSeconds: 0 });
                }
                setTimeout(() => { isUpdatingFromFirebase = false; }, 1200);
            } else {
                alert("正しいYouTubeのURLを入力してください");
            }
        }
        document.getElementById('media-url-input').value = '';
    };

    // Firebaseからのリアルタイム動画同期
    onSnapshot(doc(db, "shared_media_v4", "current"), (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.data();
        if (data.updatedBy === myId) return;

        isUpdatingFromFirebase = true;

        if (data.type === 'spotify') {
            switchMediaTab('spotify');
            document.getElementById('spotify-player').src = data.url;
            isUpdatingFromFirebase = false;
            return;
        }

        switchMediaTab('youtube');
        
        if (data.videoId && data.videoId !== currentVideoId) {
            currentVideoId = data.videoId;
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: currentVideoId, startSeconds: data.currentTime || 0 });
            }
        }

        if (player && player.getPlayerState) {
            if (data.state === "paused" && player.getPlayerState() !== YT.PlayerState.PAUSED) player.pauseVideo();
            if (data.state === "playing" && player.getPlayerState() !== YT.PlayerState.PLAYING) player.playVideo();
            
            const localTime = player.getCurrentTime();
            if (data.currentTime && Math.abs(localTime - data.currentTime) > 3.5) {
                player.seekTo(data.currentTime, true);
            }
        }
        setTimeout(() => { isUpdatingFromFirebase = false; }, 1500);
    });

    // チャット送信処理
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;
        try {
            await addDoc(collection(db, "chat_messages"), { text: input.value, senderId: myId, createdAt: serverTimestamp() });
            input.value = '';
        } catch (e) { console.error(e); }
    };

    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    // スタンプ送信処理
    document.querySelectorAll('.stamp-btn').forEach(btn => {
        btn.onclick = async () => {
            const stampUrl = btn.getAttribute('data-url');
            try {
                await addDoc(collection(db, "chat_messages"), { text: "", image: stampUrl, senderId: myId, createdAt: serverTimestamp() });
            } catch (e) { console.error("スタンプ送信エラー:", e); }
        };
    });

    // チャット表示・受信
    onSnapshot(query(collection(db, "chat_messages"), orderBy("createdAt", "asc")), (snap) => {
        container.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            const div = document.createElement('div');
            div.className = `message-wrapper ${data.senderId === myId ? 'my-messages' : 'other-messages'}`;
            
            const boxDiv = document.createElement('div');
            boxDiv.className = 'message-box';

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            if (data.text) {
                msgDiv.textContent = data.text;
            } else if (data.image) {
                const img = document.createElement('img');
                img.src = data.image;
                img.onload = scrollToBottom;
                msgDiv.appendChild(img);
            }

            boxDiv.appendChild(msgDiv);

            // 個別削除ボタン
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '❌';
            delBtn.onclick = async () => {
                if (confirm("このメッセージを削除しますか？")) {
                    await deleteDoc(doc(db, "chat_messages", d.id));
                }
            };
            boxDiv.appendChild(delBtn);

            div.appendChild(boxDiv);
            container.appendChild(div);
        });
        scrollToBottom();
    });

    // 全削除処理
    document.getElementById('clear-all-btn').onclick = async () => {
        if (!confirm("本当にすべてのチャット履歴を削除しますか？")) return;
        try {
            const snap = await getDocs(query(collection(db, "chat_messages")));
            const deletePromises = [];
            snap.forEach(d => {
                deletePromises.push(deleteDoc(doc(db, "chat_messages", d.id)));
            });
            await Promise.all(deletePromises);
            alert("すべてのチャットを削除しました！");
        } catch (e) { alert("削除に失敗しました: " + e.message); }
    };

    function switchMediaTab(type) {
        const ytEl = document.getElementById('youtube-player');
        const spEl = document.getElementById('spotify-player');
        document.getElementById('tab-youtube').classList.toggle('active', type === 'youtube');
        document.getElementById('tab-spotify').classList.toggle('active', type === 'spotify');
        if (type === 'youtube') {
            ytEl.style.display = 'block';
            spEl.style.display = 'none';
        } else {
            ytEl.style.display = 'none';
            spEl.style.display = 'block';
            if (player && player.pauseVideo) player.pauseVideo();
        }
    }

    document.getElementById('tab-youtube').onclick = () => switchMediaTab('youtube');
    document.getElementById('tab-spotify').onclick = () => switchMediaTab('spotify');
    document.getElementById('media-toggle-btn').onclick = () => {
        const c = document.getElementById('media-container');
        c.classList.toggle('minimized');
        document.getElementById('media-toggle-btn').textContent = c.classList.contains('minimized') ? "🔲" : "➖";
        scrollToBottom();
    };
</script>
</body>
</html>
