<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWYA（ロウヤ）- 同期シアター</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #007bff; color: white; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        /* メディア関連 */
        #media-section { background: #111; padding: 10px; flex-shrink: 0; }
        #media-input-wrapper { display: flex; gap: 5px; margin-bottom: 10px; }
        #media-url-input { flex: 1; padding: 8px; border-radius: 4px; border: none; font-size: 0.9rem; background: #222; color: #fff; outline: none; }
        #media-share-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #media-container { display: flex; flex-direction: column; transition: all 0.3s; }
        #media-menu { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px 10px; }
        .media-tabs { display: flex; gap: 5px; }
        .media-tab-btn { background: #444; color: #ccc; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .media-tab-btn.active { background: #007bff; color: white; }
        #media-screen { width: 100%; height: 240px; background: #000; position: relative; }
        #youtube-player { width: 100%; height: 100%; border: none; }
        #spotify-player { width: 100%; height: 100%; border: none; display: none; }
        .minimized #media-screen { height: 0; }

        /* チャットエリア */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .my-messages { align-self: flex-end; align-items: flex-end; }
        .other-messages { align-self: flex-start; align-items: flex-start; }
        .message { padding: 10px; border-radius: 15px; background: #e4e6eb; font-size: 0.9rem; word-break: break-all; white-space: pre-wrap; }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .my-messages .message { background: #007bff; color: white; }
        
        #input-container { display: flex; padding: 10px; border-top: 1px solid #ddd; gap: 8px; background: white; flex-shrink: 0; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <span>LOWYA シアターチャット 🎬</span>
        <button id="clear-all-btn" style="background:#dc3545; color:white; border:none; border-radius:4px; padding: 4px 8px; cursor:pointer;">全削除</button>
    </div>

    <div id="media-section">
        <div id="media-input-wrapper">
            <input type="text" id="media-url-input" placeholder="YouTubeの動画URLを貼り付け">
            <button id="media-share-btn" onclick="shareMedia()">動画を流す</button>
        </div>
        <div id="media-container">
            <div id="media-menu">
                <div class="media-tabs">
                    <button class="media-tab-btn active" id="tab-youtube" onclick="switchMediaTab('youtube')">YouTube (同期中)</button>
                    <button class="media-tab-btn" id="tab-spotify" onclick="switchMediaTab('spotify')">Spotify</button>
                </div>
                <button id="media-toggle-btn" style="background:none; border:none; color:white; cursor:pointer; font-size:1rem;" onclick="toggleMedia()">➖</button>
            </div>
            <div id="media-screen">
                <div id="youtube-player"></div>
                <iframe id="spotify-player" allow="encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="message-input" placeholder="メッセージを入力...">
        <button id="send-btn">送信</button>
    </div>
</div>
