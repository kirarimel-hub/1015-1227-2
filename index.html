<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOWYA（ロウヤ）</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; -webkit-tap-highlight-color: transparent; }
        #chat-container { width: 100%; max-width: 600px; height: 95vh; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #header { background: #007bff; color: white; padding: 10px 12px; display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }
        
        /* メディア関連 */
        #media-section { background: #111; padding: 10px; flex-shrink: 0; }
        #media-input-wrapper { display: flex; gap: 5px; margin-bottom: 10px; }
        #media-url-input { flex: 1; padding: 8px; border-radius: 4px; border: none; font-size: 0.9rem; background: #222; color: #fff; outline: none; }
        #media-share-btn { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #media-container { display: flex; flex-direction: column; transition: all 0.3s; }
        #media-menu { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px 10px; }
        .media-tabs { display: flex; gap: 5px; }
        .media-tab-btn { background: #444; color: #ccc; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .media-tab-btn.active { background: #007bff; color: white; }
        #media-screen { width: 100%; height: 240px; background: #000; position: relative; }
        #youtube-player { width: 100%; height: 100%; border: none; }
        #spotify-player { width: 100%; height: 100%; border: none; display: none; }
        .minimized #media-screen { height: 0; }

        /* チャットエリア */
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; background: #fff; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; margin-bottom: 5px; }
        .my-messages { align-self: flex-end; align-items: flex-end; }
        .other-messages { align-self: flex-start; align-items: flex-start; }
        
        .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; }
        .my-messages .message-row { flex-direction: row-reverse; }

        /* メッセージ本体 */
        .message { padding: 10px 14px; border-radius: 18px; background: #e4e6eb; font-size: 0.9rem; word-break: break-all; white-space: pre-wrap; cursor: pointer; transition: transform 0.1s; position: relative; user-select: none; }
        .message:active { transform: scale(0.98); }
        .my-messages .message { background: #007bff; color: white; }
        .message img { max-width: 100%; max-height: 200px; border-radius: 12px; display: block; margin: 2px 0; }
        
        /* リアクション */
        .reaction-badge-container { display: flex; gap: 3px; position: absolute; bottom: -12px; background: white; padding: 2px 6px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); border: 1px solid #eee; font-size: 0.75rem; cursor: pointer; z-index: 2; pointer-events: auto; color: #333; }
        .my-messages .reaction-badge-container { right: 10px; }
        .other-messages .reaction-badge-container { left: 10px; }

        /* インスタ風ポップアップ */
        .reaction-popup { display: none; position: absolute; background: white; border-radius: 30px; padding: 5px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); gap: 8px; z-index: 999; animation: popUp 0.15s ease-out; border: 1px solid #ddd; }
        @keyframes popUp { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .reaction-emoji-btn { font-size: 1.3rem; border: none; background: none; cursor: pointer; padding: 0 2px; transition: transform 0.1s; }
        .reaction-emoji-btn:hover { transform: scale(1.25); }

        /* 削除リンク */
        .msg-delete-link { font-size: 0.7rem; color: #aaa; text-decoration: none; cursor: pointer; visibility: hidden; margin: 0 4px; padding-bottom: 2px; }
        .message-wrapper:hover .msg-delete-link { visibility: visible; }
        
        /* 入力エリア */
        #input-container { display: flex; padding: 10px; border-top: 1px solid #ddd; gap: 8px; background: white; flex-shrink: 0; align-items: center; }
        #message-input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 0.95rem; }
        #send-btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #photo-btn { background: #f0f2f5; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #555; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">
        <button id="clear-all-btn" style="background:#dc3545; color:white; border:none; border-radius:4px; padding: 5px 10px; cursor:pointer; font-size:0.85rem;">全削除</button>
    </div>

    <!-- メディア共有セクション -->
    <div id="media-section">
        <div id="media-input-wrapper">
            <input type="text" id="media-url-input" placeholder="YouTubeの動画URLを貼り付け">
            <button id="media-share-btn">動画を流す</button>
        </div>
        <div id="media-container">
            <div id="media-menu">
                <div class="media-tabs">
                    <button class="media-tab-btn active" id="tab-youtube">YouTube (同期中)</button>
                    <button class="media-tab-btn" id="tab-spotify">Spotify</button>
                </div>
                <button id="media-toggle-btn" style="background:none; border:none; color:white; cursor:pointer; font-size:1rem;">➖</button>
            </div>
            <div id="media-screen">
                <div id="youtube-player"></div>
                <iframe id="spotify-player" allow="encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <div id="messages"></div>

    <div id="global-reaction-popup" class="reaction-popup">
        <button class="reaction-emoji-btn" data-emoji="👍">👍</button>
        <button class="reaction-emoji-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-emoji-btn" data-emoji="😂">😂</button>
        <button class="reaction-emoji-btn" data-emoji="😮">😮</button>
        <button class="reaction-emoji-btn" data-emoji="😢">😢</button>
        <button class="reaction-emoji-btn" data-emoji="🙏">🙏</button>
    </div>

    <div id="input-container">
        <button id="photo-btn" onclick="document.getElementById('file-input').click()">➕</button>
        <input type="file" id="file-input" accept="image/*">
        <input type="text" id="message-input" placeholder="メッセージを入力...">
        <button id="send-btn">送信</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    window.player = null; 
    window.currentVideoId = "JFf3uASYM4E"; 
    window.isUpdatingFromFirebase = false;

    window.onYouTubeIframeAPIReady = function() {
        try {
            window.player = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: window.currentVideoId, 
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: { 'onStateChange': window.onPlayerStateChangeCallback }
            });
        } catch (e) { console.error("YouTube Player Init Error:", e); }
    };
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDkCdoQOuL9Kh0T0P9CCJPL39WMkT5t-nw",
        authDomain: "project-2987921418155591586.firebaseapp.com",
        projectId: "project-2987921418155591586",
        storageBucket: "project-2987921418155591586.firebasestorage.app",
        messagingSenderId: "34152717352",
        appId: "1:34152717352:web:244bc26dbcf8dec5b7691d"
    };

    let db = null;
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
    } catch (e) { console.error("Firebase Init Error:", e); }

    const myId = Math.random().toString(36).substring(2, 9);
    let activeMessageId = null;
    const container = document.getElementById('messages');
    const popup = document.getElementById('global-reaction-popup');

    function scrollToBottom() { setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50); }

    // 全削除機能
    document.getElementById('clear-all-btn').onclick = async () => {
        if (!db || !confirm("本当にすべてのチャット履歴を削除しますか？")) return;
        try {
            const snap = await getDocs(query(collection(db, "chat_messages")));
            const deletePromises = [];
            snap.forEach(d => { deletePromises.push(deleteDoc(doc(db, "chat_messages", d.id))); });
            await Promise.all(deletePromises);
        } catch (e) { alert("削除に失敗しました: " + e.message); }
    };

    // 画像圧縮送信
    function compressAndSend(file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width, height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
                else { if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                sendImageToFirebase(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function sendImageToFirebase(base64Str) {
        if (!db) return;
        try { await addDoc(collection(db, "chat_messages"), { senderId: myId, image: base64Str, createdAt: serverTimestamp(), reactions: {} }); } catch (e) { console.error(e); }
    }

    document.getElementById('file-input').onchange = (e) => { if (e.target.files[0]) compressAndSend(e.target.files[0]); e.target.value = ''; };
    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('message-input');
        if (!input.value.trim() || !db) return;
        try { await addDoc(collection(db, "chat_messages"), { senderId: myId, text: input.value.trim(), createdAt: serverTimestamp(), reactions: {} }); input.value = ''; } catch (e) { console.error(e); }
    };

    document.getElementById('message-input').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('send-btn').click(); };

    // リアクション・描画・動画同期ロジック (略記)
    window.openReactionMenu = function(e, msgId) {
        e.stopPropagation(); activeMessageId = msgId;
        const rect = e.currentTarget.getBoundingClientRect();
        const containerRect = document.getElementById('chat-container').getBoundingClientRect();
        popup.style.top = `${rect.top - containerRect.top - 45}px`;
        popup.style.left = `${Math.min(Math.max(rect.left - containerRect.left + (rect.width/2) - 100, 10), containerRect.width - 210)}px`;
        popup.style.display = 'flex';
    };

    document.addEventListener('click', () => { popup.style.display = 'none'; });

    document.querySelectorAll('.reaction-emoji-btn').forEach(btn => {
        btn.onclick = async (e) => {
            e.stopPropagation(); if (!activeMessageId || !db) return;
            const emoji = btn.textContent, msgRef = doc(db, "chat_messages", activeMessageId);
            popup.style.display = 'none';
            try {
                const snap = await getDocs(query(collection(db, "chat_messages")));
                let reactions = {}; snap.forEach(d => { if(d.id === activeMessageId) reactions = d.data().reactions || {}; });
                if (reactions[emoji] && reactions[emoji].includes(myId)) { reactions[emoji] = reactions[emoji].filter(id => id !== myId); if (reactions[emoji].length === 0) delete reactions[emoji]; }
                else { if (!reactions[emoji]) reactions[emoji] = []; reactions[emoji].push(myId); }
                await updateDoc(msgRef, { reactions });
            } catch (err) { console.error(err); }
        };
    });

    if (db) {
        onSnapshot(query(collection(db, "chat_messages"), orderBy("createdAt", "asc")), (snap) => {
            container.innerHTML = '';
            snap.forEach(d => {
                const data = d.data(), msgId = d.id, reactions = data.reactions || {};
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${data.senderId === myId ? 'my-messages' : 'other-messages'}`;
                const rowDiv = document.createElement('div'); rowDiv.className = 'message-row';
                const msgDiv = document.createElement('div'); msgDiv.className = 'message';
                if (data.image) { const img = document.createElement('img'); img.src = data.image; msgDiv.appendChild(img); } else { msgDiv.textContent = data.text; }
                msgDiv.setAttribute('onclick', `openReactionMenu(event, '${msgId}')`);
                
                let count = 0, badgeText = "";
                for (const [e, u] of Object.entries(reactions)) { if (u.length > 0) { badgeText += `${e}${u.length} `; count += u.length; } }
                if (count > 0) { const b = document.createElement('div'); b.className = 'reaction-badge-container'; b.textContent = badgeText.trim(); b.setAttribute('onclick', `openReactionMenu(event, '${msgId}')`); msgDiv.appendChild(b); }
                
                rowDiv.appendChild(msgDiv);
                const del = document.createElement('span'); del.className = 'msg-delete-link'; del.textContent = '削除'; del.onclick = async (e) => { e.stopPropagation(); if(confirm("削除しますか？")) await deleteDoc(doc(db, "chat_messages", msgId)); };
                rowDiv.appendChild(del); wrapper.appendChild(rowDiv); container.appendChild(wrapper);
            });
            scrollToBottom();
        });
    }

    window.onPlayerStateChangeCallback = async function(event) {
        if (!window.player || window.isUpdatingFromFirebase || !window.currentVideoId || !db) return;
        try { await setDoc(doc(db, "shared_media_v4", "current"), { type: 'youtube', videoId: window.currentVideoId, state: event.data == YT.PlayerState.PLAYING ? "playing" : "paused", currentTime: window.player.getCurrentTime(), updatedBy: myId, timestamp: Date.now() }); } catch (e) {}
    };
</script>
</body>
</html>
